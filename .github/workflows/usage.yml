name: usage-check
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  usage-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'
      - run: yarn
      - run: yarn build
      - name: Verify USAGE.md is up to date
        run: |
          yarn oclif readme --readme-path USAGE.md
          yarn prettier USAGE.md --write
          if [ -n "$(git status --porcelain USAGE.md)" ]; then
            echo "::error file=USAGE.md::USAGE.md is out of date. Run 'yarn prepack:docker' locally and commit the changes."
            git diff USAGE.md
            exit 1
          fi
